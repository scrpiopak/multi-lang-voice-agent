<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multilingual Voice Agent - Fixed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .record-btn {
      width: 100%;
      padding: 20px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 20px;
    }

    .record-btn.recording {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .status-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .status-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }

    #status {
      color: #333;
      font-size: 14px;
      word-wrap: break-word;
    }

    .response-card {
      background: #e8f5e9;
      border-radius: 15px;
      padding: 20px;
      display: none;
    }

    .response-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2e7d32;
      margin-bottom: 8px;
    }

    #responseText {
      color: #1b5e20;
      font-size: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>
    🎤 Multilingual Voice Agent
    <span>🌐</span>
  </h2>
  <div class="subtitle">Speak in any language · AI understands & responds</div>

  <button class="record-btn" id="recordBtn">
    🎙️ Start Recording
  </button>

  <div class="status-card">
    <div class="status-label">📡 System Status</div>
    <div id="status">✅ Ready to record</div>
  </div>

  <div class="response-card" id="responseCard">
    <div class="response-label">🤖 AI Response</div>
    <div id="responseText"></div>
  </div>
</div>

<script>
  // Audio recording variables
  let mediaRecorder;
  let audioChunks = [];
  let isRecording = false;
  let stream;

  const recordBtn = document.getElementById('recordBtn');
  const statusDiv = document.getElementById('status');
  const responseCard = document.getElementById('responseCard');
  const responseTextDiv = document.getElementById('responseText');

  function setStatus(message, isError = false) {
    statusDiv.textContent = message;
    if (isError) {
      statusDiv.style.color = '#c62828';
    } else {
      statusDiv.style.color = '#333';
    }
  }

  async function startRecording() {
    try {
      setStatus("🎤 Requesting microphone access...");
      
      stream = await navigator.mediaDevices.getUserMedia({ 
        audio: {
          channelCount: 1,
          sampleRate: 16000,
          sampleSize: 16,
          echoCancellation: true,
          noiseSuppression: true
        } 
      });
      
      // Use MediaRecorder with MP3-like format (actually we'll use webm and convert in backend)
      // But let's use a format that Groq accepts: MP3, WAV, etc.
      // MediaRecorder with audio/webm or audio/mp4, then we'll send as blob
      // The key is to use a format from the allowed list
      
      // Try to use MP3 format if supported, otherwise fall back to webm
      let mimeType = '';
      const mimeTypes = [
        'audio/mpeg',
        'audio/mp3',
        'audio/mp4',
        'audio/webm',
        'audio/ogg'
      ];
      
      for (const type of mimeTypes) {
        if (MediaRecorder.isTypeSupported(type)) {
          mimeType = type;
          break;
        }
      }
      
      if (!mimeType) {
        mimeType = 'audio/webm'; // fallback
      }
      
      console.log('Using MIME type:', mimeType);
      
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      audioChunks = [];
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };
      
      mediaRecorder.onstop = async () => {
        setStatus("📤 Processing and sending to AI...");
        
        const audioBlob = new Blob(audioChunks, { type: mimeType });
        
        // Need to send as file - backend expects specific formats
        // Create FormData
        const formData = new FormData();
        
        // Determine file extension based on MIME type
        let fileExt = 'webm';
        if (mimeType.includes('mpeg') || mimeType.includes('mp3')) {
          fileExt = 'mp3';
        } else if (mimeType.includes('mp4')) {
          fileExt = 'mp4';
        } else if (mimeType.includes('ogg')) {
          fileExt = 'ogg';
        } else if (mimeType.includes('wav')) {
          fileExt = 'wav';
        }
        
        const fileName = `audio.${fileExt}`;
        formData.append('audio', audioBlob, fileName);
        
        try {
          // Send to backend
          const response = await fetch('http://127.0.0.1:8000/voice', {
            method: 'POST',
            body: formData
          });
          
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.detail || `Server error: ${response.status}`);
          }
          
          const data = await response.json();
          
          // Display response text
          responseCard.style.display = 'block';
          responseTextDiv.textContent = data.text || 'No text response received';
          
          // Play audio response if available
          if (data.audio_base64) {
            try {
              const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
              await audio.play();
              setStatus("✅ Response received and playing");
              
              audio.onended = () => {
                setStatus("✅ Ready for next recording");
              };
            } catch (audioErr) {
              console.error('Audio playback error:', audioErr);
              setStatus("✅ Response received (audio playback failed)");
            }
          } else {
            setStatus("✅ Response received (no audio)");
          }
          
        } catch (error) {
          console.error('Upload error:', error);
          setStatus(`❌ Error: ${error.message}`, true);
          responseCard.style.display = 'block';
          responseTextDiv.textContent = `Error: ${error.message}`;
          responseTextDiv.style.color = '#c62828';
        } finally {
          // Clean up
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
          }
          recordBtn.disabled = false;
          recordBtn.classList.remove('recording');
          recordBtn.innerHTML = '🎙️ Start Recording';
          isRecording = false;
        }
      };
      
      mediaRecorder.start(1000); // Collect data in 1-second chunks
      isRecording = true;
      recordBtn.classList.add('recording');
      recordBtn.innerHTML = '⏹️ Stop Recording';
      setStatus("🔴 Recording... Speak now");
      
      // Auto-stop after 30 seconds
      setTimeout(() => {
        if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
          setStatus("⏱️ Maximum recording time reached, stopping...");
          stopRecording();
        }
      }, 30000);
      
    } catch (error) {
      console.error('Microphone error:', error);
      let errorMsg = 'Failed to access microphone';
      if (error.name === 'NotAllowedError') {
        errorMsg = '❌ Microphone permission denied. Please allow access and try again.';
      } else if (error.name === 'NotFoundError') {
        errorMsg = '❌ No microphone found. Please connect a microphone.';
      }
      setStatus(errorMsg, true);
      recordBtn.disabled = false;
    }
  }
  
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      recordBtn.disabled = true;
      setStatus("⏳ Processing your recording...");
    }
  }
  
  recordBtn.onclick = async () => {
    if (!isRecording) {
      await startRecording();
    } else {
      stopRecording();
    }
  };
  
  // Check if MediaRecorder is supported
  if (!window.MediaRecorder) {
    setStatus("❌ MediaRecorder not supported in this browser", true);
    recordBtn.disabled = true;
  }
</script>

<!-- AudioWorkletProcessor is not needed anymore with MediaRecorder approach -->
</body>
</html>
